<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Regio Fletes - Almacén</title>
    <style>
        /* Elaboro   : Luis Gerardo Vazquez Carrier */
        /* Actualizo : 26 Mar 2026 */


        /* Variables de colores basadas en Regio Fletes */
        :root {
            --regio-green: #006400; /* Verde oscuro del logo */
            --regio-light-green: #008000;
            --regio-white: #ffffff;
            --bg-body: #f0f2f5;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }
    
        /* Encabezado con nueva identidad */
        header {
            background-color: var(--regio-white);
            color: var(--regio-green);
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 6px solid var(--regio-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-container img {
            max-width: 250px;
            height: auto;
            margin-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Rejilla de categorías */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Tarjeta de Unidad */
        .card {
            background: var(--regio-white);
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,100,0,0.15);
            border-color: var(--regio-green);
        }

        .img-box {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background-color: #eee;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Info de la tarjeta */
        .card-info {
            padding: 20px;
            text-align: center;
            border-top: 4px solid var(--regio-green);
        }

        .card-info span {
            display: inline-block;
            background: var(--regio-green);
            color: var(--regio-white);
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .card-info h3 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--regio-green);
        }

        footer {
            text-align: center;
            padding: 50px 0;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="regio2.jpg" alt="Logo Regio Fletes">
    </div>
    <h1>CONTROL DE ALMACÉN - REGIO FLETES</h1>
    <p>Gestión de Refacciones y Mantenimiento</p>
</header>

<div class="container">
    <div class="grid-menu">
        
        <a href="tractores.html" class="card">
            <div class="img-box">
                <img src="img/tractor.jpg" alt="Tractores">
            </div>
            <div class="card-info">
                <span>SECCIÓN 01</span>
                <h3>Tractocamiones</h3>
            </div>
        </a>

        <a href="thorton.html" class="card">
            <div class="img-box">
                <img src="img/thorton.jpg" alt="Thorton">
            </div>
            <div class="card-info">
                <span>SECCIÓN 02</span>
                <h3>Unidades Thorton</h3>
            </div>
        </a>

        <a href="rango.html" class="card">
            <div class="img-box">
                <img src="img/rango.jpg" alt="Rango Medio">
            </div>
            <div class="card-info">
                <span>SECCIÓN 03</span>
                <h3>Rango Medio</h3>
            </div>
        </a>

        <a href="remolques.html" class="card">
            <div class="img-box">
                <img src="img/remolque.jpg" alt="Remolques">
            </div>
            <div class="card-info">
         
                <span>SECCIÓN 04</span>
                <h3>Remolques / Cajas</h3>
            </div>
        </a>

<a href="sobrantes.html" class="card">
    <div class="img-box">
        <img src="img/bodega_control.jpg" alt="Sobrantes Bodega">
    </div>
    <div class="card-info">
        <span>SECCIÓN 05</span>
        <h3>Sobrantes y Usados</h3>
    </div>
</a>

    </div>
</div>

<footer>
    © 2026 Regio Fletes S.A. de C.V. | Departamento de Almacén
</footer>

</body>
</html>
