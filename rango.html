<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remolques y Cajas - Regio Fletes</title>
    <style>
        :root {
            --regio-green: #006400;
            --regio-white: #ffffff;
            --bg-body: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: var(--regio-white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            border-bottom: 3px solid var(--regio-green);
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { color: var(--regio-green); margin: 0; }

        .btn-regresar {
            text-decoration: none;
            color: var(--regio-green);
            font-weight: bold;
            font-size: 0.9rem;
        }

        #buscador {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--regio-green);
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .badge-marca {
            background: #f1f8e9;
            color: #33691e;
            padding: 3px 7px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .btn-action {
            text-decoration: none;
            font-size: 1.1rem;
            margin: 0 3px;
        }

        tr:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>REMOLQUES - REGIO FLETES</h2>
            <p style="margin: 5px 0 0; color: #666;">Control de Equipos y Pólizas Federales</p>
        </div>
        <a href="index.html" class="btn-regresar">← Volver al Menú</a>
    </header>

                <th style="text-align: center;">Acciones</th>

        <tbody id="cuerpoTabla">

    </table>
</div>

    const cuerpo = document.getElementById('cuerpoTabla');

    function cargarTabla() {
        equipos.forEach(e => {
            const fila = `<tr>
                <td style="font-weight:bold;">${e.eco}</td>
                <td><span class="badge-marca">${e.marca}</span></td>
                <td>${e.año}</td>
                <td style="font-family: monospace;">${e.serie}</td>
                <td>${e.fed}</td>
                <td style="text-align:center;">
                    <a href="refacciones/remolque_${e.eco}.html" class="btn-action" title="Piezas Almacén">📦</a>
                    <a href="pdf/seguros/fed_${e.eco}.pdf" target="_blank" class="btn-action" title="Póliza Federal">📄</a>
                </td>
            </tr>`;
            cuerpo.innerHTML += fila;
        });
    }

    function filtrarTabla() {
        const busqueda = document.getElementById('buscador').value.toUpperCase();
        const filas = cuerpo.getElementsByTagName('tr');
        for (let i = 0; i < filas.length; i++) {
            const texto = filas[i].innerText.toUpperCase();
            filas[i].style.display = texto.indexOf(busqueda) > -1 ? "" : "none";
        }
    }

    cargarTabla();
</script>

</body>
</html>
