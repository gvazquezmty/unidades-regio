<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades Tractores - Regio Fletes</title>
    <style>
        :root {
            --regio-green: #006400;
            --regio-light-green: #008000;
            --regio-white: #ffffff;
            --bg-body: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--regio-white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            border-bottom: 3px solid var(--regio-green);
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { color: var(--regio-green); margin: 0; }

        .btn-regresar {
            text-decoration: none;
            color: var(--regio-green);
            font-weight: bold;
            font-size: 0.9rem;
        }

        #buscador {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        #buscador:focus { border-color: var(--regio-green); }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--regio-green);
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .badge-motor {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .btn-action {
            text-decoration: none;
            font-size: 1.2rem;
            margin: 0 5px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .btn-action:hover { transform: scale(1.2); }

        tr:hover { background-color: #f9f9f9; }

        @media (max-width: 600px) {
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>TRACTORES - REGIO FLETES</h2>
            <p style="margin: 5px 0 0; color: #666;">Control de Unidades y Seguros</p>
        </div>
        <a href="index.html" class="btn-regresar">← Volver al Menú</a>
    </header>

    <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar por número Económico (ej. 55)...">

    <table id="tablaUnidades">
        <thead>
            <tr>
                <th>Eco</th>
                <th>Marca / Modelo</th>
                <th class="hide-mobile">Motor</th>
                <th class="hide-mobile">Placas</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            </tbody>
    </table>
</div>

        {eco: "64", marca: "KENWORTH", tipo: "T680", año: "2026", motor: "X15E6", placas: "RM-3034-B"}
    ];

    const cuerpo = document.getElementById('cuerpoTabla');

    function cargarTabla() {
        unidades.forEach(u => {
            const fila = `<tr>
                <td style="font-weight:bold;">${u.eco}</td>
                <td>${u.marca} ${u.tipo} (${u.año})</td>
                <td class="hide-mobile"><span class="badge-motor">${u.motor}</span></td>
                <td class="hide-mobile">${u.placas}</td>
                <td style="text-align:center;">
                    <a href="refacciones/eco${u.eco}.html" class="btn-action" title="Inventario de Refacciones">📦</a>
                    <a href="pdf/seguros/poliza_${u.eco}.pdf" target="_blank" class="btn-action" title="Póliza de Seguro">📄</a>
                </td>
            </tr>`;
            cuerpo.innerHTML += fila;
        });
    }

    function filtrarTabla() {
        const busqueda = document.getElementById('buscador').value.toUpperCase();
        const filas = cuerpo.getElementsByTagName('tr');
        for (let i = 0; i < filas.length; i++) {
            const celdaEco = filas[i].getElementsByTagName('td')[0];
            if (celdaEco) {
                const textoEco = celdaEco.textContent || celdaEco.innerText;
                filas[i].style.display = textoEco.toUpperCase().indexOf(busqueda) > -1 ? "" : "none";
            }
        }
    }

    cargarTabla();
</script>

</body>
</html>
