<head>

    <title>Sobrantes de Bodega - Regio Fletes</title>
    <style>
        :root { --regio-green: #006400; --regio-white: #ffffff; --bg-body: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--regio-white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { border-bottom: 3px solid var(--regio-green); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h2 { color: var(--regio-green); margin: 0; }
        .btn-regresar { text-decoration: none; color: var(--regio-green); font-weight: bold; font-size: 0.9rem; }
        #buscador { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 6px; font-size: 1rem; outline: none; }
        #buscador:focus { border-color: var(--regio-green); }
        table { width: 100%; border-collapse: collapse; }
        thead { background-color: var(--regio-green); color: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .img-pieza { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; transition: transform 0.2s; }
        .img-pieza:hover { transform: scale(1.1); }
        .badge-loc { background: #e3f2fd; color: #0d47a1; padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; border: 1px solid #bbdefb; }
        tr:hover { background-color: #f9f9f9; }
        @media (max-width: 600px) { .hide-mobile { display: none; } }
    </style>
</head>

    function cargarTabla() {
        const cuerpo = document.getElementById('cuerpoTabla');
        if (!cuerpo) return;

        let contenidoHtml = "";

        for (let i = 0; i < inventarioBodega.length; i++) {
            const p = inventarioBodega[i];
            
            const folioLimpio = p.folio ? p.folio.toString().trim() : "0";
            const descLimpia = p.desc ? p.desc.trim() : "Sin descripción";
            const tarimaLimpia = p.tarima ? p.tarima.toString().trim() : "N/A";

            contenidoHtml += `
            <tr>
                <td>
                    <a href="img/bodega/${folioLimpio}.jpg" target="_blank">
                        <img src="img/bodega/${folioLimpio}.jpg" class="img-pieza" 
                             alt="F-${folioLimpio}" 
                             onerror="this.src='img/sin-foto.jpg'">
                    </a>
                </td>
                <td style="font-weight:bold; color: #333;">${folioLimpio}</td>
                <td>${descLimpia}</td>
                <td class="hide-mobile"><span class="badge-loc">📍 Tarima ${tarimaLimpia}</span></td>
                <td style="text-align:center;">
                    <a href="img/bodega/${folioLimpio}.jpg" target="_blank" style="text-decoration:none;">👁️</a>
                </td>
            </tr>`;
        }
        cuerpo.innerHTML = contenidoHtml;
    }

        const cuerpo = document.getElementById('cuerpoTabla');
        const busqueda = input.value.toUpperCase().trim();
        const filas = cuerpo.getElementsByTagName('tr');
        
        for (let i = 0; i < filas.length; i++) {
            const textoFila = filas[i].textContent || filas[i].innerText;
            filas[i].style.display = textoFila.toUpperCase().indexOf(busqueda) > -1 ? "" : "none";
        }
    }

    // Iniciar carga
    document.addEventListener('DOMContentLoaded', cargarTabla);
</script>

</body>
</html>
