<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Refacciones Eco 32 - Regio Fletes</title>
    <style>
        :root {
            --regio-green: #006400;
            --regio-red: #d32f2f;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Elaboro : Ing. Luis Gerardo Vazquez Carrier
           Fecha   : 02 Abr 2026 

        Encabezado y Botón Regresar
           
         */

        header {
            border-bottom: 3px solid var(--regio-green);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
        }

        .btn-regresar {
            text-decoration: none;
            background-color: var(--regio-green);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Ficha Técnica de la Unidad */
        .ficha-unidad {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #e8f5e9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--regio-green);
        }

        .ficha-item { font-size: 1rem; color: #333; }
        .ficha-item strong { color: var(--regio-green); display: block; font-size: 0.8rem; text-transform: uppercase; }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--regio-green); color: white; padding: 12px; text-align: left; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .badge-loc { background: #e3f2fd; color: #1565c0; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .stock-alert { color: var(--regio-red); font-weight: bold; }
        .codigo-ref { font-family: monospace; font-weight: bold; color: var(--regio-red); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="color: var(--regio-green); margin:0;">DETALLE DE EQUIPO</h2>
        <a href="../tractores.html" class="btn-regresar">← VOLVER AL LISTADO</a>
    </header>

    <div class="ficha-unidad">

<div class="ficha-item"><strong>Número Eco</strong>     62  </div>      
<div class="ficha-item"><strong>Marca / Tipo</strong>   KENWORTH    /   T680    </div>
<div class="ficha-item"><strong>Modelo (Año)</strong>   2026    </div>      
<div class="ficha-item"><strong>Motor</strong>  X15E6   </div>      

     
</div>

    <input type="text" id="busqueda" class="search-box" onkeyup="filtrar()" placeholder="Buscar refacción en esta unidad...">

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Descripción de la Refacción</th>
                <th>Localización</th>
                <th>Mín</th>
                <th>Máx</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tablaCuerpo">
            </tbody>
    </table>
</div>

<script>
    // Datos de refacciones para el Eco 31 basados en tu catálogo
    const productos = [
   



    ];

    function cargarTabla() {
        const tabla = document.getElementById("tablaCuerpo");
        tabla.innerHTML = "";
        productos.forEach(p => {
            const alerta = p.actual <= p.min ? '<span class="stock-alert">REORDEN</span>' : '<span style="color:green">OK</span>';
            tabla.innerHTML += `
                <tr>
                    <td class="codigo-ref">${p.cod}</td>
                    <td>${p.desc}</td>
                    <td><span class="badge-loc">${p.loc}</span></td>
                    <td>${p.min}</td>
                    <td>${p.max}</td>
                    <td>${alerta}</td>
                </tr>`;
        });
    }

    function filtrar() {
        const input = document.getElementById("busqueda").value.toUpperCase();
        const filas = document.getElementById("tablaCuerpo").getElementsByTagName("tr");
        for (let i = 0; i < filas.length; i++) {
            const texto = filas[i].innerText.toUpperCase();
            filas[i].style.display = texto.indexOf(input) > -1 ? "" : "none";
        }
    }
    cargarTabla();
</script>

</body>
</html>
