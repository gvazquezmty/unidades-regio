<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Llantas - Regio Fletes</title>
    <style>
        /* Estilos inspirados en Prodynamics con colores de Regio Fletes */
        :root { --regio-green: #006400; --regio-white: #ffffff; --bg-body: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        header { border-bottom: 3px solid var(--regio-green); margin-bottom: 30px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 8px; }
        h2 { color: var(--regio-green); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        #buscador { width: 100%; padding: 15px; margin-bottom: 30px; border: 2px solid #ddd; border-radius: 30px; font-size: 1.1rem; outline: none; box-sizing: border-box; transition: 0.3s; }
        #buscador:focus { border-color: var(--regio-green); box-shadow: 0 0 8px rgba(0,100,0,0.1); }

        /* Grid de Tarjetas */
        .grid-llantas { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: transform 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; text-align: center; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        
        .img-container { width: 100%; height: 200px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .img-llanta { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info { padding: 20px; flex-grow: 1; }
        .id-label { font-size: 0.8rem; color: #999; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .marca-modelo { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 10px; display: block; }
        .medida { font-size: 1rem; color: var(--regio-green); font-weight: bold; background: #e8f5e9; padding: 5px 15px; border-radius: 15px; display: inline-block; }
        
        .detalles-footer { border-top: 1px solid #eee; padding: 15px; background: #fcfcfc; display: flex; justify-content: space-between; align-items: center; }
        .estado-tag { font-size: 0.85rem; font-weight: bold; color: #e65100; text-transform: uppercase; }
        .btn-ver { background: var(--regio-green); color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>Inventario de Llantas</h2>
            <small style="color: #666;">Regio Fletes - Consulta Visual</small>
        </div>
        <a href="index.html" style="color: var(--regio-green); font-weight: bold; text-decoration: none;">← Volver al Menú</a>
    </header>

    <input type="text" id="buscador" onkeyup="filtrarLlantas()" placeholder="Buscar por ID, Medida, Marca o Estado...">

    <div class="grid-llantas" id="contenedorLlantas">
        </div>
</div>

    function mostrarLlantas() {
        const contenedor = document.getElementById('contenedorLlantas');
        contenedor.innerHTML = llantas.map(llanta => `
            <div class="card">
                <div class="img-container">
                    <img src="img/llantas/${llanta.id}.jpg" class="img-llanta" 
                         onerror="this.src='img/sin-foto.jpg'">
                </div>
                <div class="info">
                    <div class="id-label">ID: ${llanta.id}</div>
                    <span class="marca-modelo">${llanta.marca}</span>
                    <small style="color: #666; display: block; margin-bottom: 8px;">${llanta.modelo}</small>
                    <div class="medida">${llanta.medida}</div>
                </div>
                <div class="detalles-footer">
                    <span class="estado-tag">${llanta.estado}</span>
                    <a href="img/llantas/${llanta.id}.jpg" target="_blank" class="btn-ver">VER FOTO</a>
                </div>
            </div>
        `).join('');
    }

    function filtrarLlantas() {
        const busqueda = document.getElementById('buscador').value.toUpperCase();
        const cards = document.getElementsByClassName('card');
        
        for (let card of cards) {
            const texto = card.innerText.toUpperCase();
            card.style.display = texto.includes(busqueda) ? "" : "none";
        }
    }

    // Cargar las llantas al abrir la página
    document.addEventListener('DOMContentLoaded', mostrarLlantas);
</script>

</body>
</html>
